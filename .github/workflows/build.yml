name: CI - Calculadora

# Ejecuta el pipeline en cada push y en cada pull request hacia main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configura el entorno de Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Instala las dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. BUILD: ejecuta el programa principal (Actividad 3)
      - name: Build (ejecutar programa)
        run: python calculadora.py

      # 5. PRUEBAS automáticas con pytest (Actividad 4)
      - name: Pruebas automáticas
        run: pytest -v

      # 6. ANÁLISIS de calidad con Pylint (Actividad 5)
      - name: Análisis de código con Pylint
        run: pylint calculadora.py --fail-under=9
